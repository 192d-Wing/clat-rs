syntax = "proto3";

package plat;

service PlatControl {
  // Update the NAT64 prefix at runtime.
  rpc SetPrefix(SetPrefixRequest) returns (SetPrefixResponse);

  // Query current daemon status.
  rpc GetStatus(GetStatusRequest) returns (StatusResponse);

  // List active NAT64 sessions.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Flush all active sessions.
  rpc FlushSessions(FlushSessionsRequest) returns (FlushSessionsResponse);
}

message SetPrefixRequest {
  // NAT64 prefix in CIDR notation (e.g., "64:ff9b::/96").
  string nat64_prefix = 1;
}

message SetPrefixResponse {
  // The /96 prefix now active for NAT64 translation.
  string active_prefix = 1;
}

message GetStatusRequest {}

message StatusResponse {
  // Active NAT64 /96 prefix.
  string nat64_prefix = 1;

  // IPv4 pool addresses in CIDR notation.
  repeated string ipv4_pool = 2;

  // Number of active NAT64 sessions.
  uint64 active_sessions = 3;

  // Total packets translated since startup.
  uint64 total_translations = 4;

  // Whether the packet loop is actively translating.
  bool translating = 5;

  // Packet metrics.
  PacketMetrics metrics = 6;
}

message PacketMetrics {
  // Packets successfully translated IPv6 -> IPv4.
  uint64 v6_to_v4_translated = 1;

  // Packets successfully translated IPv4 -> IPv6.
  uint64 v4_to_v6_translated = 2;

  // Packets dropped: bogon IPv4 destination.
  uint64 dropped_bogon_v4 = 3;

  // Packets dropped: reserved IPv6 source.
  uint64 dropped_reserved_v6 = 4;

  // Packets dropped: per-source rate limit exceeded.
  uint64 dropped_rate_limited = 5;

  // Packets dropped: session table exhausted.
  uint64 dropped_session_exhausted = 6;

  // Packets dropped: NAT64 prefix mismatch.
  uint64 dropped_prefix_mismatch = 7;

  // Packets dropped: invalid/malformed.
  uint64 dropped_invalid_packet = 8;
}

message ListSessionsRequest {
  // Maximum number of sessions to return (0 = all).
  uint32 limit = 1;
}

message ListSessionsResponse {
  repeated SessionEntry sessions = 1;
}

message SessionEntry {
  // Original IPv6 source address.
  string src_v6 = 1;

  // Mapped IPv4 pool address.
  string pool_v4 = 2;

  // Mapped external port.
  uint32 mapped_port = 3;

  // Protocol name (tcp/udp/icmp).
  string protocol = 4;

  // Seconds since session was created.
  uint64 age_secs = 5;

  // Seconds since last packet.
  uint64 idle_secs = 6;
}

message FlushSessionsRequest {}

message FlushSessionsResponse {
  // Number of sessions that were flushed.
  uint64 flushed_count = 1;
}
