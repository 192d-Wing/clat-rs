name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: task fmt-check

      - name: Clippy
        run: task clippy

      - name: Audit
        run: task audit

      - name: Test
        run: task test

      - name: Build
        run: task build

      - name: Coverage
        run: task coverage-lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/llvm-cov/lcov.info
          fail_ci_if_error: true
          flags: ${{ matrix.arch }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
